<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Releases | Modern Feed & Share</title>
    <meta name="description" content="Browse and share the latest BigQuery release notes with a premium, interactive interface.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="circle-gradient circle-1"></div>
    <div class="circle-gradient circle-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fa-solid fa-database"></i>
                    <i class="fa-solid fa-bolt overlay-icon"></i>
                </div>
                <div class="brand-text">
                    <h1>BigQuery</h1>
                    <span class="subtitle">Release Tracker</span>
                </div>
            </div>
            <div class="actions">
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <i class="fa-solid fa-rotate-right" id="refresh-icon"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Main Stats / Quick Filter Area -->
        <section class="controls-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Search updates, keywords...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-type="all">All Updates</button>
                <button class="filter-btn" data-type="feature"><span class="badge feature"></span> Features</button>
                <button class="filter-btn" data-type="changed"><span class="badge changed"></span> Changes</button>
                <button class="filter-btn" data-type="deprecated"><span class="badge deprecated"></span> Deprecations</button>
            </div>
        </section>

        <!-- Loader -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Fetching the latest release notes...</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-container hidden">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <h3>Oops! Something went wrong</h3>
            <p id="error-text">Failed to fetch release notes from the Google Cloud feed.</p>
            <button id="retry-btn" class="btn btn-secondary">Try Again</button>
        </div>

        <!-- Release Notes Feed -->
        <main id="feed-container" class="feed-grid"></main>
    </div>

    <!-- Twitter Preview Modal -->
    <div id="tweet-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-brands fa-x-twitter"></i> Share Update</h3>
                <button class="close-modal-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p class="modal-label">Prepare your Tweet text:</p>
                <div class="tweet-box-container">
                    <textarea id="tweet-textarea" maxlength="280" placeholder="What's happening?"></textarea>
                    <div class="tweet-char-count"><span id="char-count">0</span> / 280</div>
                </div>
                <div class="tweet-preview-section">
                    <span class="preview-title">Preview on X:</span>
                    <div class="tweet-preview">
                        <div class="tweet-avatar">BQ</div>
                        <div class="tweet-preview-content">
                            <span class="tweet-author">BigQuery Releases</span>
                            <span class="tweet-handle">@BigQueryReleases</span>
                            <p id="tweet-preview-text"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-tweet-btn">Cancel</button>
                <button class="btn btn-twitter" id="post-tweet-btn">
                    <i class="fa-brands fa-x-twitter"></i>
                    <span>Tweet</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
